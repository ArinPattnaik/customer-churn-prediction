services:
  - type: web
    name: churnguard
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn webapp:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --max-requests 50 --max-requests-jitter 10
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: MPLBACKEND
        value: "Agg"
